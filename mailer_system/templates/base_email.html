<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Vahdam India</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" type="text/css" />
  <style type="text/css">
    /* Client resets */
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; }
    img { border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
    table { border-collapse: collapse !important; }
    body { height: 100% !important; margin: 0 !important; padding: 0 !important; width: 100% !important; background-color: #f5f0e8; }
    a[x-apple-data-detectors] { color: inherit !important; text-decoration: none !important; font-size: inherit !important; font-family: inherit !important; font-weight: inherit !important; line-height: inherit !important; }

    /* Mobile */
    @media only screen and (max-width: 600px) {
      .email-headline { font-size: 32px !important; line-height: 1.25 !important; }
      .img-cell { display: none !important; max-height: 0 !important; overflow: hidden !important; mso-hide: all !important; }
      .product-text-cell { width: 100% !important; padding: 28px 24px !important; }
      .two-col-table { width: 100% !important; }
      .mobile-pad { padding-left: 24px !important; padding-right: 24px !important; }
      .value-col { display: block !important; width: 100% !important; padding-bottom: 24px !important; }
    }
  </style>

  <style type="text/css">

    <o:OfficeDocumentSettings>

  <![endif]-->
</head>
<body style="margin:0; padding:0; background-color:#f5f0e8; font-family:'DM Sans',Arial,Helvetica,sans-serif;">

  <!-- Preheader — hidden preview text -->
  <div style="display:none; font-size:0px; max-height:0; overflow:hidden; mso-hide:all; opacity:0; color:#f5f0e8; height:0; width:0;">{{PREHEADER}}&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;</div>

  <!-- Outer wrapper -->
  <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color:#f5f0e8;">
    <tr>
      <td align="center" valign="top" style="padding:20px 0;">

        <!-- Email body — 600px max -->
        <table border="0" cellpadding="0" cellspacing="0" width="600" align="center" style="max-width:600px; width:100%;">

          <!-- LOGO ROW -->
          <tr>
            <td>
              <table border="0" cellpadding="0" cellspacing="0" width="100%" bgcolor="#0f2a1c" style="background-color:#0f2a1c;">
                <tr>
                  <td align="center" valign="middle" style="padding:22px 0 20px 0; font-family:'DM Sans',Arial,Helvetica,sans-serif; font-size:11px; color:#5a8a6a; letter-spacing:0.35em; text-transform:uppercase; mso-line-height-rule:exactly; line-height:16px;">
                    VAHDAM
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- HERO SECTION -->
          {{HERO_SECTION}}

          <!-- VALUE SECTION -->
          {{VALUE_SECTION}}

          <!-- PRODUCT SECTION -->
          {{PRODUCT_SECTION}}

          <!-- TRUST SECTION -->
          {{TRUST_SECTION}}

          <!-- FOOTER SECTION -->
          {{FOOTER_SECTION}}

          <!-- UNSUBSCRIBE ROW -->
          <tr>
            <td>
              <table border="0" cellpadding="0" cellspacing="0" width="100%" bgcolor="#f5f0e8" style="background-color:#f5f0e8;">
                <tr>
                  <td align="center" style="padding:28px 40px 32px 40px; font-family:'DM Sans',Arial,Helvetica,sans-serif; font-size:10px; color:#6a5e4e; line-height:1.7;">
                    You&#8217;re receiving this because you opted in at vahdam.com
                    &nbsp;&middot;&nbsp;
                    <a href="{{UNSUBSCRIBE_URL}}" style="color:#6a5e4e; text-decoration:underline;">Unsubscribe</a>
                    &nbsp;&middot;&nbsp;
                    <a href="{{PRIVACY_URL}}" style="color:#6a5e4e; text-decoration:underline;">Privacy Policy</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

        </table>
        <!-- /600px table -->

      </td>
    </tr>
  </table>
  <!-- /outer wrapper -->

</body>
</html>
