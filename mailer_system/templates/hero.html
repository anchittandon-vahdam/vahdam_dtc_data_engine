<tr>
  <td>
    <table border="0" cellpadding="0" cellspacing="0" width="600" bgcolor="#0f2a1c" style="background-color:#0f2a1c; width:100%;">
      <tr>
        <td align="center" valign="top" style="padding:56px 48px 20px 48px;">
          <!-- Eyebrow label -->
          <p style="margin:0 0 20px 0; font-family:'DM Sans',Arial,Helvetica,sans-serif; font-size:11px; color:#5a8a6a; letter-spacing:0.2em; text-transform:uppercase; mso-line-height-rule:exactly; line-height:16px;">{{EYEBROW}}</p>
          <!-- Hero headline -->
          <h1 class="email-headline" style="margin:0 0 20px 0; font-family:'Cormorant Garamond','Georgia',serif; font-size:44px; font-weight:400; color:#f5ead8; line-height:1.2; max-width:480px; mso-line-height-rule:exactly;">{{HEADLINE}}</h1>
          <!-- Subheadline -->
          <p style="margin:0 0 36px 0; font-family:'DM Sans',Arial,Helvetica,sans-serif; font-size:15px; font-weight:300; color:#9aaa96; line-height:1.6; max-width:400px; mso-line-height-rule:exactly;">{{SUBHEADLINE}}</p>
          <!-- CTA button -->
          <table border="0" cellpadding="0" cellspacing="0">
            <tr>
              <td align="center" bgcolor="#d4873a" style="background-color:#d4873a; border-radius:2px; mso-padding-alt:14px 36px;">
                <a href="{{CTA_URL}}" target="_blank" style="display:inline-block; font-family:'DM Sans',Arial,Helvetica,sans-serif; font-size:13px; font-weight:500; color:#0f2a1c; text-decoration:none; padding:14px 36px; border-radius:2px; letter-spacing:0.05em; mso-padding-alt:0; line-height:1;">{{CTA_TEXT}}</a>
              </td>
            </tr>
          </table>
        </td>
      </tr>
      <!-- Hero image -->
      <tr>
        <td align="center" valign="top" style="padding:32px 0 0 0;">
          <!-- DESIGNER: insert {{IMAGE_SUGGESTION}} — suggested shot type from API -->
          <img src="{{HERO_IMAGE_URL}}" width="600" height="320" border="0" alt="Vahdam tea" style="display:block; width:100%; height:auto; max-width:600px;" />
        </td>
      </tr>
    </table>
  </td>
</tr>
