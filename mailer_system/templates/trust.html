<tr>
  <td>
    <table border="0" cellpadding="0" cellspacing="0" width="600" bgcolor="#0f2a1c" style="background-color:#0f2a1c; width:100%;">
      <tr>
        <td align="center" valign="top" style="padding:56px 48px 48px 48px;">

          <!-- Quote mark -->
          <p style="margin:0 0 12px 0; font-family:'Cormorant Garamond','Georgia',serif; font-size:48px; color:#2a4a36; line-height:1; mso-line-height-rule:exactly;">&ldquo;</p>

          <!-- Quote text -->
          <p style="margin:0 0 20px 0; font-family:'Cormorant Garamond','Georgia',serif; font-size:24px; font-weight:400; font-style:italic; color:#f5ead8; line-height:1.5; max-width:480px; mso-line-height-rule:exactly;">
            &#8212; {{QUOTE}} &#8212;
          </p>

          <!-- Attribution -->
          <p style="margin:0 0 40px 0; font-family:'DM Sans',Arial,Helvetica,sans-serif; font-size:11px; font-weight:400; color:#5a8a6a; letter-spacing:0.05em; mso-line-height-rule:exactly; line-height:16px;">
            {{ATTRIBUTION}}
          </p>

          <!-- Stats row -->
          <table border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width:420px; margin:0 auto;">
            <tr>
              <!-- Stat 1 -->
              <td align="center" valign="top" width="33%" style="padding:0 8px; border-right:1px solid #1a3a2a;">
                <p style="margin:0 0 4px 0; font-family:'DM Sans',Arial,Helvetica,sans-serif; font-size:22px; font-weight:500; color:#d4873a; mso-line-height-rule:exactly; line-height:28px;">{{STAT_1_VALUE}}</p>
                <p style="margin:0; font-family:'DM Sans',Arial,Helvetica,sans-serif; font-size:10px; font-weight:400; color:#5a8a6a; letter-spacing:0.15em; text-transform:uppercase; mso-line-height-rule:exactly; line-height:16px;">{{STAT_1_LABEL}}</p>
              </td>
              <!-- Stat 2 -->
              <td align="center" valign="top" width="33%" style="padding:0 8px; border-right:1px solid #1a3a2a;">
                <p style="margin:0 0 4px 0; font-family:'DM Sans',Arial,Helvetica,sans-serif; font-size:22px; font-weight:500; color:#d4873a; mso-line-height-rule:exactly; line-height:28px;">{{STAT_2_VALUE}}</p>
                <p style="margin:0; font-family:'DM Sans',Arial,Helvetica,sans-serif; font-size:10px; font-weight:400; color:#5a8a6a; letter-spacing:0.15em; text-transform:uppercase; mso-line-height-rule:exactly; line-height:16px;">{{STAT_2_LABEL}}</p>
              </td>
              <!-- Stat 3 -->
              <td align="center" valign="top" width="33%" style="padding:0 8px;">
                <p style="margin:0 0 4px 0; font-family:'DM Sans',Arial,Helvetica,sans-serif; font-size:22px; font-weight:500; color:#d4873a; mso-line-height-rule:exactly; line-height:28px;">{{STAT_3_VALUE}}</p>
                <p style="margin:0; font-family:'DM Sans',Arial,Helvetica,sans-serif; font-size:10px; font-weight:400; color:#5a8a6a; letter-spacing:0.15em; text-transform:uppercase; mso-line-height-rule:exactly; line-height:16px;">{{STAT_3_LABEL}}</p>
              </td>
            </tr>
          </table>

        </td>
      </tr>
    </table>
  </td>
</tr>
